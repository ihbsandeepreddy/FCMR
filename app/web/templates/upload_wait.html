{% extends "base.html" %}
{% block title %}Processing Upload — SanGir Automations{% endblock %}
{% block page_title %}Processing Upload{% endblock %}

{% block content %}
<div style="max-width:600px; margin:0 auto;">
  <div class="card">
    <div class="card-title">Processing your files…</div>
    <div class="card-sub">Please wait. You will be redirected automatically when done.</div>

    <div style="margin-top:24px;">
      <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px;">
        <span id="progress-label">Starting…</span>
        <span id="progress-pct">0%</span>
      </div>
      <div style="background:var(--row-alt); border-radius:6px; height:10px; overflow:hidden;">
        <div id="progress-bar" style="height:100%; width:0%; background:var(--accent); border-radius:6px; transition:width 0.3s ease;"></div>
      </div>
    </div>

    <div id="error-msg" style="display:none; margin-top:16px;" class="notice notice-err"></div>

    <div style="margin-top:20px; text-align:center;">
      <a href="/dashboard/upload" class="btn btn-ghost btn-sm">← Upload again</a>
    </div>
  </div>
</div>

<script>
  const jobId = {{ job_id | tojson }};
  const bar   = document.getElementById("progress-bar");
  const pct   = document.getElementById("progress-pct");
  const lbl   = document.getElementById("progress-label");
  const err   = document.getElementById("error-msg");

  const poll = setInterval(async function() {
    try {
      const resp = await fetch("/dashboard/upload-progress/" + jobId);
      const data = await resp.json();

      bar.style.width = data.pct + "%";
      pct.textContent = data.pct + "%";
      lbl.textContent = data.label || "Processing…";

      if (data.status === "done") {
        clearInterval(poll);
        bar.style.width = "100%";
        pct.textContent = "100%";
        lbl.textContent = "Done! Redirecting…";
        if (data.redirect) {
          window.location.href = data.redirect;
        }
      } else if (data.status === "error") {
        clearInterval(poll);
        err.style.display = "block";
        err.textContent = data.label || "Processing failed. Please try uploading again.";
      } else if (data.status === "not_found") {
        clearInterval(poll);
        err.style.display = "block";
        err.textContent = "Upload session expired. Please try uploading again.";
      }
    } catch (e) {
      // Network hiccup — keep polling
    }
  }, 800);
</script>
{% endblock %}
