<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SanGir Automations — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Lora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css?v={{ request.state.app_version }}" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 40px 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      box-shadow: var(--shadow);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo img {
      max-width: 160px;
      max-height: 50px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    .login-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .form-group input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      background: var(--surface);
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--text);
    }
    .form-group input:focus {
      outline: 2px solid var(--accent);
      border-color: transparent;
    }
    .submit-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', system-ui, sans-serif;
      transition: background 0.2s;
    }
    .submit-btn:hover {
      background: var(--accent-h);
    }
    .help-text {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="/static/img/sangir-logo.png" alt="SanGir Automations">
        <div class="login-title">SanGir Automations</div>
        <div class="login-subtitle">Audit Analytics & Automated Solutions</div>
      </div>

      {% if error %}
      <div class="notice notice-err" role="alert" style="margin-bottom:14px;">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
      </form>

      <div class="help-text">
        Default credentials: admin / admin123
      </div>
    </div>
  </div>

  <script>
  document.querySelector('form').addEventListener('submit', function(e) {
    var btn = document.getElementById('login-btn');
    if (btn) {
      btn.disabled = true;
      btn.style.opacity = '0.65';
      btn.textContent = 'Signing in…';
    }
  });
  </script>
</body>
</html>
