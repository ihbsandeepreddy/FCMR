name: Build and Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install Node dependencies
        run: npm install

      - name: Build Python backend (PyInstaller)
        run: npm run build:backend

      # Build the NSIS installer locally on the runner WITHOUT publishing.
      # This always succeeds (no token needed) and produces dist/SAND-Setup-*.exe.
      - name: Build and package Electron app
        run: npm run dist -- --publish never

      # The installer is always retrievable from the Actions run, even if the
      # cross-repo publish below cannot run (e.g. RELEASE_TOKEN not configured).
      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAND-Setup-${{ github.ref_name }}
          path: |
            dist/SAND-Setup-*.exe
            dist/SAND-Setup-*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

      # Publish the installer + latest.yml to the public sangir-releases repo so
      # the auto-updater can find it. Requires RELEASE_TOKEN to be a PAT with
      # contents:write on ihbsandeepreddy/sangir-releases. Non-fatal: if the token
      # is missing/insufficient, the build still succeeds and the artifact above
      # remains downloadable.
      - name: Publish to sangir-releases
        continue-on-error: true
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
