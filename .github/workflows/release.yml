name: Build and Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install Node dependencies
        run: npm install

      - name: Build Python backend (PyInstaller)
        run: npm run build:backend

      # electron-builder publishes the installer + latest.yml directly to the
      # sangir-releases repo (see publish: in electron-builder.yml). GH_TOKEN must
      # be a PAT with contents:write on ihbsandeepreddy/sangir-releases.
      - name: Build, package, and publish Electron app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
